# Default level cho t?t c? logger
org.slf4j.simpleLogger.defaultLogLevel=info

# DAO layer ch?y DEBUG ?? th?y "save() affected N row(s)" trong dev
# Comment ḍng d??i n?u mu?n DAO im l?ng (production)
org.slf4j.simpleLogger.log.com.auction.server.DAO=debug

# Server (service + handler) ? m?c ??nh INFO
# B? comment ḍng d??i n?u mu?n DEBUG cho snapshot/event verbose
# org.slf4j.simpleLogger.log.com.auction.server=debug

# HikariCP m?c ??nh verbose, h? xu?ng warn cho ?? ?n
org.slf4j.simpleLogger.log.com.zaxxer.hikari=warn

# Format output: timestamp + level + logger + message
org.slf4j.simpleLogger.showDateTime=true
org.slf4j.simpleLogger.dateTimeFormat=yyyy-MM-dd HH:mm:ss
org.slf4j.simpleLogger.showThreadName=true
org.slf4j.simpleLogger.showShortLogName=true
org.slf4j.simpleLogger.levelInBrackets=true